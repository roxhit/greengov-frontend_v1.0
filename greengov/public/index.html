<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f3d2e" />

    <!-- Primary Meta Tags -->
    <meta name="title" content="GreenGov — Sustainable Governance Platform" />
    <meta
      name="description"
      content="GreenGov empowers governments and communities to drive sustainable development, transparent green policy, and environmental accountability."
    />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="GreenGov — Sustainable Governance Platform"
    />
    <meta
      property="og:description"
      content="Empowering governments and communities to drive sustainable development and transparent green policy."
    />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- Apple -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Google Fonts (preconnect for performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <title>GreenGov — Sustainable Governance Platform</title>

    <style>
      /* Prevent flash of unstyled content */
      body {
        background-color: #faf9f5;
      }
      /* Loading spinner shown before React mounts */
      #root-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0f3d2e;
      }
      #root-loader .leaf-spinner {
        font-size: 3rem;
        animation: spin 1.2s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <noscript>
      You need to enable JavaScript to run GreenGov. Please enable JavaScript in
      your browser settings and reload the page.
    </noscript>

    <div id="root">
      <!-- Shown while React bundle loads -->
      <div id="root-loader">
        <span class="leaf-spinner" role="status" aria-label="Loading">🌿</span>
      </div>
    </div>

    <!-- Bootstrap 5 JS Bundle (Popper included) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
